<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixora Feed</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

:root {
    --bg:#0f0f14;
    --card:rgba(27,27,37,0.8);
    --brand:#40c1ba;
    --text:#fff;
    --soft:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    padding:15px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #222;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:var(--brand);
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:800px;
    margin:20px auto;
    padding:10px;
}

/* POST BOX */
.post-box{
    background:var(--card);
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:80px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    padding:10px;
    border-radius:10px;
}

/* POST */
.post{
    background:var(--card);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.meta{
    font-size:12px;
    color:var(--soft);
    margin-bottom:8px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.action-btn{
    background:#222;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.comment-box{
    margin-top:10px;
    display:none;
}

.comment{
    margin-top:8px;
    padding:8px;
    background:#111;
    border-radius:10px;
    font-size:13px;
}

/* MOBILE */
@media(max-width:768px){
    .container{padding:5px;}
}

</style>
</head>

<body>

<header>
<div>🎧 Mixora Feed</div>
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<!-- POST CREATE -->
<div class="post-box">
    <textarea id="content" placeholder="Share your setup..."></textarea>
    <button onclick="createPost()">Postar</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script>

const SUPABASE_URL = "https://mrkhxqojxqnqzaeulpvh.supabase.co";
const SUPABASE_KEY = "sb_publishable_fysx_fm474qhZzH3pW3qnw_7qEgvNmj";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const user = localStorage.getItem("user");

if(!user){
    window.location.href = "index.html";
}

/* CREATE POST */
async function createPost(){

    const content = document.getElementById("content").value;
    if(!content) return;

    await client.from("posts").insert([{ username:user, content }]);

    document.getElementById("content").value = "";
    loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){

    const { data } = await client
        .from("posts")
        .select("*")
        .order("created_at",{ascending:false});

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    for(const post of data){

        const likes = await client
            .from("likes")
            .select("*")
            .eq("post_id", post.id);

        const comments = await client
            .from("comments")
            .select("*")
            .eq("post_id", post.id)
            .order("created_at",{ascending:true});

        feed.innerHTML += `
        <div class="post">

            <div class="meta">
                @${post.username}
                <span class="arrow" onclick="toggle('${post.id}')">⬆</span>
            </div>

            <div>${post.content}</div>

            <div class="actions">
                <div class="btn" onclick="likePost('${post.id}')">
                    ❤️ ${likes.data.length}
                </div>

                <div class="btn" onclick="toggle('${post.id}')">
                    💬 ${comments.data.length}
                </div>

                ${post.username === user ? `
                <div class="btn" onclick="deletePost('${post.id}')">🗑</div>
                ` : ""}
            </div>

            <div class="comment-box" id="c-${post.id}">
                
                <input id="input-${post.id}" placeholder="write comment..." />
                <button onclick="comment('${post.id}')">Send</button>

                <div id="comments-${post.id}">
                    ${comments.data.map(c => `
                        <div class="comment">
                            <b>@${c.username}</b>: ${c.content}
                        </div>
                    `).join("")}
                </div>

            </div>

        </div>
        `;
    }
}

/* LIKE */
async function likePost(postId){

    await client.from("likes").insert([{
        post_id: postId,
        username: user
    }]);

    loadPosts();
}

/* COMMENT */
async function comment(postId){

    const input = document.getElementById("input-"+postId);

    if(!input.value) return;

    await client.from("comments").insert([{
        post_id: postId,
        username: user,
        content: input.value
    }]);

    input.value = "";
    loadPosts();
}

/* TOGGLE COMMENTS */
function toggle(id){

    const box = document.getElementById("c-"+id);

    if(box.style.display === "block"){
        box.style.display = "none";
    } else {
        box.style.display = "block";
    }
}

/* DELETE */
async function deletePost(id){

    await client.from("posts").delete().eq("id", id);

    loadPosts();
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("user");
    window.location.href="index.html";
}

loadPosts();


</script>

</body>
</html>
