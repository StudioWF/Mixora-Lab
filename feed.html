<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixora Feed</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

:root{
    --bg:#0f0f14;
    --card:rgba(27,27,37,0.75);
    --brand:#40c1ba;
    --text:#fff;
    --soft:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:rgba(15,15,20,0.8);
    backdrop-filter:blur(10px);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

button{
    background:var(--brand);
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:700px;
    margin:30px auto;
    padding:15px;
}

/* POST BOX */
.post-box{
    background:var(--card);
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.05);
    color:white;
    resize:none;
}

.post{
    background:var(--card);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.username{
    color:var(--brand);
    font-weight:bold;
}

.small{
    color:var(--soft);
    font-size:12px;
    margin-top:5px;
}

.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.like-btn{
    background:transparent;
    border:1px solid var(--brand);
    color:var(--brand);
}

@media(max-width:768px){
    .container{padding:10px;}
}

</style>
</head>

<body>

<header>
    <div>Mixora Feed</div>
    <div>
        <button onclick="logout()">Sair</button>
    </div>
</header>

<div class="container">

    <div class="post-box">
        <textarea id="postContent" placeholder="Compartilhe seu setup..."></textarea>
        <button onclick="createPost()">Postar</button>
    </div>

    <div id="feed"></div>

</div>

<script>

const SUPABASE_URL = "https://mrkhxqojxqnqzaeulpvh.supabase.co";
const SUPABASE_KEY = "SUA_ANON_KEY_AQUI";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* pega usuário do login */
let user = localStorage.getItem("user");

if(!user){
    window.location.href = "community.html";
}

async function createPost(){

    const content = document.getElementById("postContent").value.trim();

    if(!content){
        alert("Escreva algo");
        return;
    }

    const { error } = await client.from("posts").insert([{
        username: user,
        content: content
    }]);

    if(error){
        console.log(error);
        alert("Erro ao postar");
        return;
    }

    document.getElementById("postContent").value = "";

    await loadPosts(); // 🔥 ISSO AQUI É O QUE FALTAVA
}

/* carregar posts */
async function loadPosts(){

    const { data, error } = await client
        .from("posts")
        .select("*")
        .order("id", { ascending: false });

    if(error){
        console.log(error);
        return;
    }

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    if(!data || data.length === 0){
        feed.innerHTML = "<p style='color:#888'>No posts yet</p>";
        return;
    }

    data.forEach(post => {

        feed.innerHTML += `
        <div class="post">
            <div class="username">@${post.username}</div>
            <div>${post.content}</div>
            <div class="small">${post.created_at || ""}</div>
        </div>
        `;
    });
}



function logout(){
    localStorage.removeItem("user");
    window.location.href = "community.html";
}

loadPosts();

</script>

</body>
</html>
